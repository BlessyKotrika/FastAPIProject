name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'app/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'ecs-template.yaml'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'ecs-template.yaml'
      - '.github/workflows/deploy.yml'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: khetipulse-api
  ECS_SERVICE: khetipulse-prod-service
  ECS_CLUSTER: khetipulse-prod-cluster
  TASK_DEFINITION: khetipulse-prod-task
  CONTAINER_NAME: khetipulse-api

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify Prerequisites
        run: |
          echo "🔍 Verifying prerequisites..."
          
          # Check if ECR repository exists
          if ! aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "❌ ECR repository ${{ env.ECR_REPOSITORY }} does not exist. Please create it first."
            exit 1
          fi
          echo "✅ ECR repository exists"
          
          # Check if required secrets exist
          REQUIRED_SECRETS=(
            "/khetipulse/prod/SECRET_KEY"
            "/khetipulse/prod/OPENWEATHER_API_KEY"
            "/khetipulse/prod/BEDROCK_KB_ID"
            "/khetipulse/prod/S3_BUCKET_NAME"
            "/khetipulse/prod/AGMARKNET_API_KEY"
          )
          
          for secret in "${REQUIRED_SECRETS[@]}"; do
            if ! aws secretsmanager describe-secret --secret-id "$secret" --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
              echo "❌ Secret $secret does not exist. Please create it first."
              exit 1
            fi
          done
          echo "✅ All required secrets exist"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build Docker image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

          # Push images
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Export image URI for later use
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy or Update CloudFormation Stack
        run: |
          STACK_NAME="khetipulse-prod"
          TEMPLATE_FILE="ecs-template.yaml"
          
          # Check if stack exists
          if aws cloudformation describe-stacks --stack-name $STACK_NAME --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "Stack exists, updating..."
            aws cloudformation update-stack \
              --stack-name $STACK_NAME \
              --template-body file://$TEMPLATE_FILE \
              --parameters ParameterKey=EnvironmentName,ParameterValue=prod \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
              --region ${{ env.AWS_REGION }}
            
            # Wait for update to complete
            aws cloudformation wait stack-update-complete --stack-name $STACK_NAME --region ${{ env.AWS_REGION }}
          else
            echo "Stack does not exist, creating..."
            aws cloudformation create-stack \
              --stack-name $STACK_NAME \
              --template-body file://$TEMPLATE_FILE \
              --parameters ParameterKey=EnvironmentName,ParameterValue=prod \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
              --region ${{ env.AWS_REGION }}
            
            # Wait for creation to complete
            aws cloudformation wait stack-create-complete --stack-name $STACK_NAME --region ${{ env.AWS_REGION }}
          fi
          
          # Get Load Balancer URL for reference
          ALB_URL=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --region ${{ env.AWS_REGION }} --query 'Stacks[0].Outputs[?OutputKey==`LoadBalancerURL`].OutputValue' --output text)
          if [ -n "$ALB_URL" ]; then
            echo "Load Balancer URL: $ALB_URL"
            echo "ALB_URL=$ALB_URL" >> $GITHUB_ENV
          fi

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
          --task-definition ${{ env.TASK_DEFINITION }} \
          --query taskDefinition > task-definition.json

      - name: Update task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ env.IMAGE_URI }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment Summary
        run: |
          echo "🚀 Deployment completed successfully!"
          echo "📍 Application URL: ${{ env.ALB_URL }}"
          echo "🔗 ECS Cluster: ${{ env.ECS_CLUSTER }}"
          echo "🛠️  ECS Service: ${{ env.ECS_SERVICE }}"
          echo "🐳 Docker Image: ${{ env.IMAGE_URI }}"

      - name: Logout of Amazon ECR
        if: always()
        run: docker logout ${{ steps.login-ecr.outputs.registry }}